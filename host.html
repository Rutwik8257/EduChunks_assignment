<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bidirectional Rich Text Sync</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; padding: 20px; min-height: 100vh; }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  h1 { font-size: 16px; font-weight: 600; color: #e2e8f0; letter-spacing: 0.04em; }

  #msg-counter {
    background: #1e40af;
    color: #bfdbfe;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    min-width: 28px;
    text-align: center;
    transition: transform 0.1s;
  }
  #msg-counter.bump { transform: scale(1.3); }

  /* ── Controls ── */
  #controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .ctrl-btn {
    padding: 5px 14px;
    font-size: 12px;
    border-radius: 5px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #94a3b8;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .ctrl-btn:hover { background: #334155; color: #e2e8f0; }
  .ctrl-btn.active { background: #dc2626; border-color: #dc2626; color: #fff; }

  /* ── Frames ── */
  #frames-area {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-bottom: 16px;
  }

  .frame-wrap {
    flex: 1;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .frame-label {
    background: #1e293b;
    color: #64748b;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .frame-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .frame-label .dot.lit { opacity: 1; }

  iframe { width: 100%; height: 230px; border: none; display: block; }

  /* ── Connection bridge ── */
  #bridge {
    width: 60px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
  }

  .arrow {
    font-size: 16px;
    color: #334155;
    transition: color 0.2s;
    line-height: 1;
  }
  .arrow.lit-ab { color: #60a5fa; }
  .arrow.lit-ba { color: #f472b6; }

  #latency {
    font-size: 10px;
    color: #475569;
    font-variant-numeric: tabular-nums;
    text-align: center;
    min-width: 44px;
  }
  #latency span { color: #22c55e; font-weight: 700; }

  /* ── Log ── */
  #log-section {
    background: #1e293b;
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.2);
  }

  #log-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  #log-header .label {
    color: #64748b;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex: 1;
  }

  #log {
    height: 120px;
    overflow-y: auto;
    font-size: 11.5px;
    font-family: 'Courier New', monospace;
    color: #cbd5e1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

  .log-entry {
    display: grid;
    grid-template-columns: 90px 72px 110px 1fr;
    gap: 4px;
    align-items: baseline;
    padding: 1px 0;
    animation: slideIn 0.18s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(-6px); } to { opacity:1; } }

  .log-time   { color: #475569; }
  .log-source { font-weight: 700; }
  .log-source.A { color: #60a5fa; }
  .log-source.B { color: #f472b6; }
  .log-type   { color: #a78bfa; }
  .log-type.TEXT_SYNC        { color: #34d399; }
  .log-type.UNDO_REDO_SYNC   { color: #fbbf24; }
  .log-html   { color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .log-entry:hover .log-html { color: #94a3b8; }

  /* paused banner */
  #paused-banner {
    display: none;
    text-align: center;
    background: #7f1d1d;
    color: #fca5a5;
    font-size: 12px;
    font-weight: 600;
    padding: 6px;
    border-radius: 6px;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
  #paused-banner.visible { display: block; }
</style>
</head>
<body>

<div id="header">
  <h1>Bidirectional Rich Text Sync · Across Iframes</h1>
  <span id="msg-counter">0</span>
</div>

<div id="controls">
  <button class="ctrl-btn" id="pause-btn">⏸ Pause Sync</button>
  <button class="ctrl-btn" id="export-btn">⬇ Export Log</button>
  <button class="ctrl-btn" id="clear-btn">✕ Clear Log</button>
</div>

<div id="paused-banner">⏸ SYNC PAUSED — messages are being dropped</div>

<div id="frames-area">
  <div class="frame-wrap">
    <div class="frame-label">
      <span class="dot" id="dot-a"></span>
      Frame A
    </div>
    <iframe id="frameA" src="editor.html"></iframe>
  </div>

  <div id="bridge">
    <div class="arrow" id="arrow-ab">→</div>
    <div id="latency">—<br><span id="lat-val"></span></div>
    <div class="arrow" id="arrow-ba">←</div>
  </div>

  <div class="frame-wrap">
    <div class="frame-label">
      <span class="dot" id="dot-b"></span>
      Frame B
    </div>
    <iframe id="frameB" src="editor.html"></iframe>
  </div>
</div>

<div id="log-section">
  <div id="log-header">
    <span class="label">postMessage Log</span>
  </div>
  <div id="log"></div>
</div>

<script>
  const frameA      = document.getElementById('frameA');
  const frameB      = document.getElementById('frameB');
  const log         = document.getElementById('log');
  const counter     = document.getElementById('msg-counter');
  const pauseBtn    = document.getElementById('pause-btn');
  const dotA        = document.getElementById('dot-a');
  const dotB        = document.getElementById('dot-b');
  const arrowAB     = document.getElementById('arrow-ab');
  const arrowBA     = document.getElementById('arrow-ba');
  const latVal      = document.getElementById('lat-val');
  const banner      = document.getElementById('paused-banner');

  const ALLOWED_ORIGIN = window.location.origin;
  const SYNC_TYPES     = ['FORMAT_SYNC', 'TEXT_SYNC', 'UNDO_REDO_SYNC'];

  let paused   = false;
  let msgCount = 0;
  let logData  = []; // for export

  // ── Pause / Resume ────────────────────────────────────────────────────────
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶ Resume Sync' : '⏸ Pause Sync';
    pauseBtn.classList.toggle('active', paused);
    banner.classList.toggle('visible', paused);
  });

  // ── Clear log ─────────────────────────────────────────────────────────────
  document.getElementById('clear-btn').addEventListener('click', () => {
    log.innerHTML = '';
    logData = [];
    msgCount = 0;
    counter.textContent = '0';
  });

  // ── Export log ────────────────────────────────────────────────────────────
  document.getElementById('export-btn').addEventListener('click', () => {
    if (!logData.length) return;
    const text = logData.map(r =>
      `[${r.time}] Frame ${r.source} | ${r.type}${r.action ? ' · ' + r.action : ''} | latency: ${r.latency}ms\n  ${r.html}`
    ).join('\n\n');
    const a    = document.createElement('a');
    a.href     = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
    a.download = `sync-log-${Date.now()}.txt`;
    a.click();
  });

  // ── Message broker ────────────────────────────────────────────────────────
  window.addEventListener('message', (e) => {
    if (e.origin !== ALLOWED_ORIGIN && e.origin !== 'null') return;

    const { type, action, html, ts } = e.data;
    if (!SYNC_TYPES.includes(type)) return;

    const isA = e.source === frameA.contentWindow;
    const isB = e.source === frameB.contentWindow;
    if (!isA && !isB) return;

    const source  = isA ? 'A' : 'B';
    const target  = isA ? frameB : frameA;
    const latency = ts ? (Date.now() - ts) : null;

    if (!paused) {
      target.contentWindow.postMessage({ type, action, html }, '*');
    }

    bumpCounter();
    flashBridge(source, latency);
    flashFrameDot(source);
    addLog(source, type, action, html, latency);
  });

  // ── Counter bump ──────────────────────────────────────────────────────────
  function bumpCounter() {
    msgCount++;
    counter.textContent = msgCount;
    counter.classList.add('bump');
    clearTimeout(counter._t);
    counter._t = setTimeout(() => counter.classList.remove('bump'), 150);
  }

  // ── Bridge animation ──────────────────────────────────────────────────────
  function flashBridge(source, latency) {
    const arrow = source === 'A' ? arrowAB : arrowBA;
    const cls   = source === 'A' ? 'lit-ab' : 'lit-ba';
    arrow.classList.add(cls);
    clearTimeout(arrow._t);
    arrow._t = setTimeout(() => arrow.classList.remove(cls), 500);

    if (latency !== null) {
      latVal.textContent = latency + 'ms';
      clearTimeout(latVal._t);
      latVal._t = setTimeout(() => latVal.textContent = '', 2000);
    }
  }

  // ── Frame dot ────────────────────────────────────────────────────────────
  function flashFrameDot(source) {
    // Dot on the *receiving* frame
    const dot = source === 'A' ? dotB : dotA;
    dot.classList.add('lit');
    clearTimeout(dot._t);
    dot._t = setTimeout(() => dot.classList.remove('lit'), 700);
  }

  // ── Log entry ─────────────────────────────────────────────────────────────
  function addLog(source, type, action, html, latency) {
    const now  = new Date();
    const time = now.toTimeString().slice(0, 8) + '.' + String(now.getMilliseconds()).padStart(3,'0');
    const lat  = latency !== null ? latency + 'ms' : '—';
    const act  = action || (type === 'TEXT_SYNC' ? 'input' : type === 'UNDO_REDO_SYNC' ? action : '');

    logData.push({ time, source, type, action: act, html, latency: lat });

    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML =
      `<span class="log-time">${time}</span>` +
      `<span class="log-source ${source}">Frame ${source} →${source==='A'?'B':'A'}</span>` +
      `<span class="log-type ${type}">${type}${act ? ' · ' + act : ''}</span>` +
      `<span class="log-html">${esc(html)} <em style="color:#334155">[${lat}]</em></span>`;

    log.appendChild(entry);
    // Keep max 200 entries
    if (log.children.length > 200) log.removeChild(log.firstChild);
    log.scrollTop = log.scrollHeight;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
